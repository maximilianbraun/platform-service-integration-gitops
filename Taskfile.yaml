version: 3

vars:
  COMPONENTS: 'platform-service-integration-gitops'
  API_DIRS: '{{.ROOT_DIR}}/api/v1alpha1/...'
  MANIFEST_OUT: '{{.ROOT_DIR}}/config/crd/bases'
  CODE_DIRS: '{{.ROOT_DIR}}/cmd/... {{.ROOT_DIR}}/internal/... {{.ROOT_DIR}}/api/v1alpha1/...'
  COMMON_SCRIPT_DIR: '{{.ROOT_DIR}}/hack/common'

tasks:
  generate:
    desc: "Run code generation (deepcopy + CRDs)"
    cmds:
      - go install sigs.k8s.io/controller-tools/cmd/controller-gen@latest
      - controller-gen object paths={{.API_DIRS}}
      - controller-gen crd paths={{.API_DIRS}} output:crd:dir={{.MANIFEST_OUT}}

  validate:
    desc: "Run validation (vet + build)"
    cmds:
      - go vet ./...
      - go build ./...

  test:
    desc: "Run unit tests"
    cmds:
      - go test ./internal/... ./test/e2e/mock/... -count=1 -v

  test-e2e:
    desc: "Build image and run E2E tests"
    cmds:
      - task: build-image
      - go test -tags=e2e -v ./test/e2e/... -count=1 -timeout=15m

  build:
    desc: "Build the binary"
    cmds:
      - go build -o bin/{{.COMPONENTS}} ./cmd/{{.COMPONENTS}}/

  build-image:
    desc: "Build Docker image for testing"
    cmds:
      - task: build
      - docker build -t ghcr.io/openmcp-project/images/{{.COMPONENTS}}:latest .

  lint:
    desc: "Run linter"
    cmds:
      - golangci-lint run ./...

  fmt:
    desc: "Format code"
    cmds:
      - gofmt -s -w .
      - goimports -w .

  clean:
    desc: "Remove build artifacts"
    cmds:
      - rm -rf bin/
