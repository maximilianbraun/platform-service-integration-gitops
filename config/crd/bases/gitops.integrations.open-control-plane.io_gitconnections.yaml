---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: gitconnections.gitops.integrations.open-control-plane.io
spec:
  group: gitops.integrations.open-control-plane.io
  names:
    kind: GitConnection
    listKind: GitConnectionList
    plural: gitconnections
    singular: gitconnection
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.providerRef
      name: Provider
      type: string
    - jsonPath: .spec.organization
      name: Organization
      type: string
    - jsonPath: .spec.primary
      name: Primary
      type: boolean
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          GitConnection is the Schema for the gitconnections API.
          It represents a user-managed, provider-agnostic connection to a git hosting organization.
          GitConnection is namespaced and lives on the onboarding cluster in a project or workspace namespace.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of GitConnection.
            properties:
              organization:
                description: |-
                  Organization is the name of the organization or group on the git hosting provider.
                  The controller will resolve provider-specific details (e.g., GitHub App installation ID)
                  automatically based on this name.
                type: string
              primary:
                default: false
                description: |-
                  Primary marks this connection as the default for the namespace.
                  When a resource annotation specifies an empty connection name, the primary connection is used.
                  Only one connection per namespace can be primary.
                type: boolean
              providerRef:
                description: |-
                  ProviderRef is the name of the GitProvider resource to use for authentication.
                  This references a cluster-scoped GitProvider on the platform cluster.
                type: string
              repositories:
                description: |-
                  Repositories optionally restricts the token scope to specific repositories.
                  If empty, the token has access to all repositories the App is installed on.
                items:
                  type: string
                type: array
            required:
            - organization
            - providerRef
            type: object
          status:
            description: status defines the observed state of GitConnection.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the GitConnection's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              installUrl:
                description: |-
                  InstallUrl provides the URL for the user to install the App on their organization.
                  Only set when phase is AppNotInstalled.
                type: string
              managedSecrets:
                description: ManagedSecrets lists the secrets that have been synced
                  to MCPs.
                items:
                  description: ManagedSecret describes a secret that has been synced
                    to an MCP.
                  properties:
                    mcp:
                      description: MCP is the name of the Managed Control Plane where
                        the secret is synced.
                      type: string
                    namespace:
                      description: Namespace is the namespace of the synced secret
                        on the MCP.
                      type: string
                    project:
                      description: Project is the project that owns the MCP.
                      type: string
                    secretName:
                      description: SecretName is the name of the synced secret on
                        the MCP.
                      type: string
                    workspace:
                      description: Workspace is the workspace that owns the MCP.
                      type: string
                  required:
                  - mcp
                  - namespace
                  - project
                  - secretName
                  - workspace
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the last generation reconciled
                  by the controller.
                format: int64
                type: integer
              phase:
                description: Phase is the current lifecycle phase of the GitConnection.
                type: string
              tokenExpiresAt:
                description: TokenExpiresAt is the expiration time of the current
                  token.
                format: date-time
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
