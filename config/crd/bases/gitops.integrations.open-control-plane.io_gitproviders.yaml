---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: gitproviders.gitops.integrations.open-control-plane.io
spec:
  group: gitops.integrations.open-control-plane.io
  names:
    kind: GitProvider
    listKind: GitProviderList
    plural: gitproviders
    singular: gitprovider
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.host
      name: Host
      type: string
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          GitProvider is the Schema for the gitproviders API.
          It describes a git hosting backend and its authentication mechanism.
          GitProvider is cluster-scoped and lives on the platform cluster.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of GitProvider.
            properties:
              githubApp:
                description: |-
                  GitHubApp holds GitHub App specific configuration.
                  Required when type is GitHubApp.
                properties:
                  appId:
                    description: AppId is the GitHub App ID.
                    format: int64
                    type: integer
                  privateKeySecretRef:
                    description: |-
                      PrivateKeySecretRef is a reference to the secret containing the GitHub App private key.
                      The secret must contain a key named "private-key.pem".
                    properties:
                      name:
                        description: Name of the secret.
                        type: string
                      namespace:
                        description: Namespace of the secret.
                        type: string
                    required:
                    - name
                    - namespace
                    type: object
                required:
                - appId
                - privateKeySecretRef
                type: object
              gitlabGroupToken:
                description: |-
                  GitLabGroupToken holds GitLab group token configuration.
                  Required when type is GitLabGroupToken.
                properties:
                  tokenSecretRef:
                    description: |-
                      TokenSecretRef is a reference to the secret containing the group or project access token.
                      The secret must contain a key named "token".
                    properties:
                      name:
                        description: Name of the secret.
                        type: string
                      namespace:
                        description: Namespace of the secret.
                        type: string
                    required:
                    - name
                    - namespace
                    type: object
                required:
                - tokenSecretRef
                type: object
              gitlabOAuth:
                description: |-
                  GitLabOAuth holds GitLab OAuth specific configuration.
                  Required when type is GitLabOAuth.
                properties:
                  applicationId:
                    description: ApplicationId is the GitLab OAuth application ID.
                    type: string
                  secretRef:
                    description: |-
                      SecretRef is a reference to the secret containing the client secret.
                      The secret must contain a key named "client-secret".
                    properties:
                      name:
                        description: Name of the secret.
                        type: string
                      namespace:
                        description: Namespace of the secret.
                        type: string
                    required:
                    - name
                    - namespace
                    type: object
                required:
                - applicationId
                - secretRef
                type: object
              host:
                description: Host is the hostname of the git hosting provider (e.g.,
                  "github.com").
                type: string
              tokenRefresh:
                description: TokenRefresh configures token refresh behavior.
                properties:
                  refreshBeforeExpiry:
                    default: 10m
                    description: |-
                      RefreshBeforeExpiry defines how long before token expiry the controller should
                      refresh the token. Defaults to "10m".
                    type: string
                type: object
              type:
                description: Type specifies the authentication mechanism to use.
                enum:
                - GitHubApp
                - GitLabOAuth
                - GitLabGroupToken
                type: string
