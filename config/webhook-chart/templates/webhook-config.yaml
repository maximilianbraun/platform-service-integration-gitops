apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: git-connection-webhook
  annotations:
    cert-manager.io/inject-ca-from: {{ .Values.namespace }}/git-connection-webhook-tls
webhooks:
  - name: gitops.gitops.integrations.open-control-plane.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    clientConfig:
      service:
        name: git-connection-webhook
        namespace: {{ .Values.namespace }}
        path: /mutate-gitops
    rules:
      - apiGroups: ["source.toolkit.fluxcd.io"]
        apiVersions: ["v1", "v1beta2"]
        operations: ["CREATE", "UPDATE"]
        resources: ["gitrepositories", "ocirepositories"]
      - apiGroups: ["notification.toolkit.fluxcd.io"]
        apiVersions: ["v1beta3"]
        operations: ["CREATE", "UPDATE"]
        resources: ["providers"]
    failurePolicy: Fail
    matchPolicy: Equivalent
    objectSelector:
      matchExpressions:
        - key: gitops.integrations.open-control-plane.io/skip-webhook
          operator: DoesNotExist
