apiVersion: gitops.integrations.open-control-plane.io/v1alpha1
kind: GitProvider
metadata:
  name: github-com-e2e
spec:
  host: "github.com"
  type: GitHubApp
  githubApp:
    appId: 123456
    privateKeySecretRef:
      name: github-app-key-e2e
      namespace: openmcp-system
  tokenRefresh:
    refreshBeforeExpiry: "5m"
