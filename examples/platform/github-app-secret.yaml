# Secret containing the GitHub App private key.
#
# Generate the private key in your GitHub App settings:
#   Settings > Developer settings > GitHub Apps > [your app] > Generate a private key
#
# The downloaded .pem file contents go into the "private-key.pem" key below.
# NEVER commit this file with real credentials — use it as a template only.
apiVersion: v1
kind: Secret
metadata:
  name: github-app-key
  namespace: openmcp-system
type: Opaque
stringData:
  # Paste your PEM-encoded private key here.
  private-key.pem: |
    -----BEGIN RSA PRIVATE KEY-----
    <replace with your GitHub App private key>
    -----END RSA PRIVATE KEY-----
