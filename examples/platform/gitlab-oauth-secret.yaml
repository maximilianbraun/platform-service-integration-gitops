# Secret containing GitLab OAuth client secret.
#
# Create the OAuth application in GitLab:
#   Admin Area > Applications > New application
#
# Copy the "Secret" value into the "client-secret" key below.
# NEVER commit this file with real credentials — use it as a template only.
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-oauth-credentials
  namespace: openmcp-system
type: Opaque
stringData:
  # The client secret from the GitLab OAuth application.
  client-secret: "<replace with your GitLab OAuth client secret>"
