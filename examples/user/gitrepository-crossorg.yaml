# GitRepository with org override annotation.
#
# Use the gitops-org annotation when accessing a repository outside the
# connection's default organization. The GitHub App (or other provider)
# must have access to the target org for this to work.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: shared-base
  namespace: flux-system
  annotations:
    # Reference a named connection (not primary).
    gitops.integrations.open-control-plane.io/connection: my-org
    # The repository name in the overridden org.
    gitops.integrations.open-control-plane.io/repository: base-configs
    # Override the default org from the connection.
    # Webhook constructs: https://github.com/shared-infra-org/base-configs
    gitops.integrations.open-control-plane.io/organization: shared-infra-org
spec:
  interval: 10m
  url: changeme
  ref:
    branch: main
