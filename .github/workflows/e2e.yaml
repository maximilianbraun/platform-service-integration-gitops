name: E2E Tests

on:
  pull_request:

permissions:
  contents: read

jobs:
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate
        run: task generate --verbose

      - name: Validate
        run: task validate --verbose

      - name: Run E2E Tests
        run: task test-e2e
